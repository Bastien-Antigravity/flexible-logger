name: CI/CD Go

on:
  push:
    branches: [develop, main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GOTOOLCHAIN: auto

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Build all packages
        run: go build ./...

      - name: Install golangci-lint from source
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Run golangci-lint
        run: make lint

      - name: Run standard unit tests
        run: go test -v -race -coverprofile=coverage.out ./...
        continue-on-error: false

      - name: Upload coverage (optional)
        uses: codecov/codecov-action@v4
        with:
          file: coverage.out
        if: success()

      - name: Build integration test binary
        run: go build -o /tmp/integration-test ./cmd/test

      - name: Run integration test
        # The test expects a config/default.yaml file.
        # We create a minimal one if it doesn't exist, as per the user requirement.
        run: |
          if [ ! -f config/default.yaml ]; then
            mkdir -p config
            cat > config/default.yaml << EOF
          common:
            name: common
            reset: false
          capabilities:
            log_server:
              ip: 127.0.0.1
              port: "9020"
            notif_server:
              ip: 127.0.0.1
              port: "10080"
          common_file_path: ""
          memconfigpath: ""
          EOF
          fi
          /tmp/integration-test

      # - name: Build config-cli (optional)
      #   run: |
      #     if [ -d "cmd/config-cli" ]; then
      #       go build -o /tmp/config-cli ./cmd/config-cli
      #     fi
